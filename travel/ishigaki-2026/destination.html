<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>目的地資料 · 八重山旅行 KM · JustKM</title>
  <meta name="description" content="依島嶼集中顯示交通、活動、景點、餐廳、住宿與注意事項。">
  <style>
    :root{--bg:#f4f1e9;--card:#fff;--ink:#1c2721;--muted:#657169;--line:#d9ddd7;--green:#176b48;--blue:#315f9e;--amber:#946008;--shadow:0 13px 38px #25332910}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.65 system-ui,-apple-system,"Noto Sans TC",sans-serif}a{color:inherit}main{max-width:1180px;margin:auto;padding:24px 20px 90px}.top,.tabs,.chips,.links{display:flex;gap:9px;flex-wrap:wrap;align-items:center}.top{justify-content:space-between}.button,.tabs a,.chips a{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 13px;text-decoration:none}.tabs{margin:36px 0 24px}.tabs a.active{background:var(--ink);color:#fff}.hero{display:grid;grid-template-columns:1fr minmax(250px,.5fr);gap:24px;align-items:end;padding:18px 0 30px}.eyebrow{font-weight:900;letter-spacing:.1em;color:var(--green)}h1{font-size:clamp(42px,8vw,76px);line-height:1;margin:8px 0 16px}.lede{font-size:18px;color:var(--muted);max-width:770px}.base{background:#19372b;color:#eff8f2;border-radius:20px;padding:20px;box-shadow:var(--shadow)}.base strong{display:block;margin-bottom:8px}.quick{display:flex;gap:7px;flex-wrap:wrap;margin-top:17px}.quick span{background:#e3eee7;color:var(--green);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}.notice{background:#fff7e4;border:1px solid #e6c879;padding:14px 16px;border-radius:15px;margin:0 0 28px}.chips{position:sticky;top:8px;z-index:5;background:#f4f1e9e8;backdrop-filter:blur(8px);padding:10px 0}.chips a{font-size:13px}.section{scroll-margin-top:76px;margin-top:42px}.section-head{display:grid;grid-template-columns:auto 1fr;gap:13px;align-items:start;margin-bottom:16px}.section-icon{font-size:28px}.section h2{font-size:27px;margin:0}.section-head p{color:var(--muted);margin:3px 0 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:13px}.item{background:var(--card);border:1px solid var(--line);border-radius:17px;padding:18px;box-shadow:var(--shadow)}.item h3{font-size:18px;line-height:1.35;margin:9px 0 7px}.item p{color:var(--muted);margin:0}.status{display:inline-block;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:900}.verified{background:#e1f2e8;color:var(--green)}.candidate{background:#edf1f8;color:var(--blue)}.volatile{background:#fff0d2;color:var(--amber)}.links{border-top:1px solid var(--line);margin-top:13px;padding-top:11px}.links a{color:var(--blue);font-size:13px;font-weight:800}.empty{padding:50px;text-align:center;color:var(--muted)}footer{margin-top:55px;border-top:1px solid var(--line);padding-top:18px;color:var(--muted)}@media(max-width:720px){.hero{grid-template-columns:1fr}.chips{position:static}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body><main>
  <div class="top"><a class="button" href="index.html">← 旅遊 KM</a><a class="button" href="itinerary.html">查看最終行程 →</a></div>
  <nav class="tabs" id="tabs"></nav>
  <div id="content"><p class="empty">正在載入目的地資料……</p></div>
  <footer>本頁集中目前 JustKM 已收錄的目的地資料，不代表島上所有商家。官方規則與易變資料仍以出發前查核為準。</footer>
</main>
<script>
const esc=v=>String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const key=new URLSearchParams(location.search).get('place')||'iriomote';
fetch('destinations-data.json').then(r=>{if(!r.ok)throw Error(r.status);return r.json()}).then(db=>{
  const d=db.destinations[key]||db.destinations.iriomote; const active=Object.keys(db.destinations).find(k=>db.destinations[k]===d)||'iriomote';
  document.title=`${d.name}完整資料 · 八重山旅行 KM · JustKM`;
  document.querySelector('#tabs').innerHTML=Object.entries(db.destinations).map(([k,v])=>`<a class="${k===active?'active':''}" href="destination.html?place=${esc(k)}">${esc(v.icon)} ${esc(v.name)}</a>`).join('');
  document.querySelector('#content').innerHTML=`<header class="hero"><div><div class="eyebrow">DESTINATION FIRST · ${esc(d.jp)}</div><h1>${esc(d.icon)} ${esc(d.name)}</h1><p class="lede">${esc(d.summary)}</p><div class="quick">${d.quick_notes.map(x=>`<span>${esc(x)}</span>`).join('')}</div></div><aside class="base"><strong>本次使用方式</strong>${esc(d.base)}</aside></header><div class="notice"><strong>閱讀方式：</strong>到達這個島後，只需要看本頁。活動、景點、餐廳、交通與住宿都集中在這裡；「出發前重查」代表時刻、營業或天候容易變動。</div><nav class="chips">${d.sections.map(s=>`<a href="#${esc(s.id)}">${esc(s.icon)} ${esc(s.title)} <small>${s.items.length}</small></a>`).join('')}</nav>${d.sections.map(s=>`<section class="section" id="${esc(s.id)}"><div class="section-head"><span class="section-icon">${esc(s.icon)}</span><div><h2>${esc(s.title)}</h2><p>${esc(s.intro)}</p></div></div><div class="grid">${s.items.map(i=>`<article class="item"><span class="status ${esc(i.status)}">${esc(db.status_labels[i.status])}</span><h3>${esc(i.name)}</h3><p>${esc(i.summary)}</p><div class="links">${i.links.map(l=>`<a href="${esc(l.url)}" ${/^https?:/.test(l.url)?'target="_blank" rel="noopener"':''}>↗ ${esc(l.label)}</a>`).join('')}</div></article>`).join('')}</div></section>`).join('')}`;
}).catch(()=>document.querySelector('#content').innerHTML='<p class="empty">無法載入 destinations-data.json，請透過網站開啟本頁。</p>');
</script></body></html>
